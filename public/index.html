<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Music Box</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Music Box">
  <meta name="theme-color" content="#1a1a1a">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="device">
    <div id="screen">
      <div id="screen-header">
        <button id="theme-btn" type="button">light</button>
        <span id="screen-title">Music Box</span>
      </div>

      <div id="screen-content">
        <div id="browse-view">
          <input id="search" type="search" placeholder="Search…" autocomplete="off" autocapitalize="off" spellcheck="false">
          <div id="breadcrumb"></div>
          <main id="listing"></main>
        </div>

        <div id="nowplaying-view">
          <div id="artwork-wrap"><img id="artwork" alt=""></div>
          <div id="np-title">Nothing playing</div>
          <div id="np-artist"></div>
          <div id="np-seek-row">
            <span id="time-current">0:00</span>
            <input id="seek" type="range" min="0" max="100" value="0" step="0.1">
            <span id="time-duration">0:00</span>
          </div>
        </div>
      </div>

      <button id="mini-status" type="button"><span id="mini-status-text">Nothing playing</span></button>
    </div>

    <div id="wheel" role="group" aria-label="Click wheel — drag to scroll, tap Menu, Previous, Next, Play/Pause, or Select">
      <div id="wheel-menu" class="wheel-btn wheel-top" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 9h16M4 15h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </div>
      <div id="wheel-prev" class="wheel-btn wheel-left" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zM20 6L10 12l10 6z" fill="currentColor"/></svg>
      </div>
      <div id="wheel-next" class="wheel-btn wheel-right" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 6l10 6-10 6z" fill="currentColor"/></svg>
      </div>
      <div id="wheel-play" class="wheel-btn wheel-bottom" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M8 5l12 7-12 7z" fill="currentColor"/></svg>
      </div>
      <div id="wheel-select" aria-hidden="true"></div>
    </div>
  </div>

  <audio id="audio" preload="none"></audio>

  <script src="lib/jsmediatags.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
