<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Music Box</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Music Box">
  <meta name="theme-color" content="#1a1a1a">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="device">
    <div id="screen">
      <div id="screen-header">
        <button id="theme-btn" type="button">light</button>
        <span id="screen-title">Music Box</span>
        <span id="battery">🔋</span>
      </div>

      <div id="screen-content">
        <div id="browse-view">
          <input id="search" type="search" placeholder="Search…" autocomplete="off" autocapitalize="off" spellcheck="false">
          <div id="breadcrumb"></div>
          <main id="listing"></main>
        </div>

        <div id="nowplaying-view">
          <div id="artwork-wrap"><img id="artwork" alt=""></div>
          <div id="np-title">Nothing playing</div>
          <div id="np-artist"></div>
          <div id="np-seek-row">
            <span id="time-current">0:00</span>
            <input id="seek" type="range" min="0" max="100" value="0" step="0.1">
            <span id="time-duration">0:00</span>
          </div>
        </div>
      </div>

      <button id="mini-status" type="button">Nothing playing</button>
    </div>

    <div id="wheel">
      <button id="wheel-menu" class="wheel-btn wheel-top" type="button">MENU</button>
      <button id="wheel-prev" class="wheel-btn wheel-left" type="button" aria-label="Previous">⏮</button>
      <button id="wheel-next" class="wheel-btn wheel-right" type="button" aria-label="Next">⏭</button>
      <button id="wheel-play" class="wheel-btn wheel-bottom" type="button" aria-label="Play/Pause">⏯</button>
      <button id="wheel-select" type="button">SELECT</button>
    </div>
  </div>

  <audio id="audio" preload="none"></audio>

  <script src="lib/jsmediatags.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
