<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Music Box</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Music Box">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a1a">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="device">
    <div id="screen">
      <div id="screen-content">
        <div id="browse-view">
          <div id="browse-toolbar">
            <input id="search" type="search" placeholder="Search…" autocomplete="off" autocapitalize="off" spellcheck="false">
            <button id="shuffle-all-btn" type="button" aria-label="Shuffle all">
              <svg class="icon" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15L21 21M4 4L9 9" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <div id="breadcrumb"></div>
          <main id="listing"></main>
        </div>

        <div id="nowplaying-view">
          <div id="artwork-wrap">
            <img id="artwork" alt="">
          </div>
          <div id="np-overlay">
            <div id="np-time-markers">
              <span id="time-current">0:00</span>
              <span class="time-sep">/</span>
              <span id="time-duration">0:00</span>
            </div>
            <div id="np-waveform"></div>
          </div>

        </div>
      </div>

      <div id="mini-status">
        <div id="mini-progress-thumb" aria-hidden="true"></div>
        <button id="mini-status-btn" type="button">
          <span id="mini-status-text">Nothing playing</span>
          <span id="mini-status-album"></span>
          <span id="mini-status-artist"></span>
        </button>
        <button id="locate-btn" type="button" aria-label="Show in file browser">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="wheel" role="group" aria-label="Click wheel — drag to scroll, tap Menu, Previous, Next, Play/Pause, or Select">
      <div id="wheel-menu" class="wheel-btn wheel-top" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 9h16M4 15h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </div>
      <div id="wheel-prev" class="wheel-btn wheel-left" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zM20 6L10 12l10 6z" fill="currentColor"/></svg>
      </div>
      <div id="wheel-next" class="wheel-btn wheel-right" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 6l10 6-10 6z" fill="currentColor"/></svg>
      </div>
      <div id="wheel-play" class="wheel-btn wheel-bottom" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M8 5l12 7-12 7z" fill="currentColor"/></svg>
      </div>
      <div id="wheel-select" aria-hidden="true"></div>
    </div>
  </div>

  <!-- full-screen annotate panel — deliberately outside #device, not constrained to the
       simulated device screen, so there's room for a real note-taking experience -->
  <div id="annotate-panel">
    <div id="annotate-path"></div>
    <div id="annotate-toggles">
      <button id="tag-trash-btn" type="button" class="annotate-toggle">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Trash</span>
      </button>
      <button id="tag-favorite-btn" type="button" class="annotate-toggle">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 3l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.1-5.4 3.1 1.3-6-4.6-4.1 6.1-.6z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>
        <span>Favorite</span>
      </button>
    </div>
    <textarea id="annotate-note" placeholder="Notes…"></textarea>
    <input id="annotate-tag-input" type="text" placeholder="Add tag, press enter…" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div id="annotate-current-tags"></div>
    <div id="annotate-suggested-label">Previously used</div>
    <div id="annotate-suggested-tags"></div>
    <div id="annotate-actions">
      <button id="annotate-cancel-btn" type="button">Cancel</button>
      <button id="annotate-save-btn" type="button">Save</button>
    </div>
  </div>

  <audio id="audio" preload="none"></audio>

  <script src="app.js"></script>
</body>
</html>
